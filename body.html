<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Secret Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* Движещ се фон */
    .background {
        position: absolute;
        width: 200%;
        height: 200%;
        display: flex;
        flex-wrap: wrap;
        font-size: 20px;
        opacity: 0.12;
        animation: moveBg 10s linear infinite;
        transform: rotate(-15deg);
    }

    .background span {
        margin: 10px;
        white-space: nowrap;
    }

    @keyframes moveBg {
        0% {
            transform: translate(0, 0) rotate(-15deg);
        }
        100% {
            transform: translate(-200px, -200px) rotate(-15deg);
        }
    }

    /* Login box */
    .box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.85);
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        z-index: 2;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    input {
        padding: 10px;
        border: none;
        border-radius: 8px;
        margin-top: 10px;
        width: 200px;
        text-align: center;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #ff1e3c;
    }
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="box">
    <h2>Въведи парола</h2>
    <input type="password" id="password" placeholder="Парола">
    <br>
    <button onclick="checkPassword()">Вход</button>
</div>

<script>
const bg = document.getElementById("bg");

const text = "губиш си времето но давай смело 💥";

for (let i = 0; i < 250; i++) {
    let span = document.createElement("span");
    span.textContent = text;
    bg.appendChild(span);
}

function checkPassword() {
    const pass = document.getElementById("password").value;

    if (pass === "Azis") {
        window.location.href = "body.html";
    } else {
        alert("Грешна парола!");
    }
}
</script>

</body>
</html>
