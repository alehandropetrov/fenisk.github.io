<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Hacker Mode</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: monospace;
    }

    /* картината */
    img {
        max-width: 100%;
        max-height: 100%;
        filter: brightness(1.1) contrast(1.2);
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { filter: brightness(1) drop-shadow(0 0 10px #00ff00); }
        to   { filter: brightness(1.3) drop-shadow(0 0 25px #00ff00); }
    }

    /* текст отгоре */
    .text {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: #00ff00;
        font-size: 28px;
        text-shadow: 0 0 10px #00ff00;
        z-index: 2;
    }
</style>
</head>

<body>

<div class="text">ПРОДЪЛЖАВАШ ДА СИ ГУБИШ ВРЕМЕТО</div>

<img src="sandbox:/mnt/data/a_dark_cyberpunk_tech_scene_overall_like_a_hacker.png" alt="hacker image">

</body>
</html>
