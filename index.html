<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Secret Page</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
        }

        .box {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            width: 200px;
            text-align: center;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff1e3c;
        }

        #message {
            display: none;
            font-size: 22px;
            margin-top: 20px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Въведи парола</h2>
    <input type="password" id="password" placeholder="Парола">
    <br>
    <button onclick="checkPassword()">Вход</button>
    <div id="message">ЗАГУБИ СИ ВРЕМЕТО САМО</div>
</div>

<script>
function checkPassword() {
    const pass = document.getElementById("password").value;
    if (pass === "Azis") {
        document.getElementById("message").style.display = "block";
    } else {
        alert("Грешна парола!");
    }
}
</script>

</body>
</html>
