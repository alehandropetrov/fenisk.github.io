function go_otp() {
    var tt = new Date();
    var di2 = document.getElementById('mdiv1');
    di2.innerHTML = "";
    var di = document.getElementById('mdiv');
    di.innerHTML = "<svg width='300' height='400' version='1.1' xmlns='http://www.w3.org/2000/svg'>" +
        "<path d='M 120 100 L 100 100 L 100 110 l 20 0 m -20 0 L 100 120 l 20 0 " +
        "M 132 110 a 20,20 0 1,0 40,0 a 20,20 0 1,0 -40,0 " +
        "M 184 120 l 0 -20 l 20 20 l 0 -20' stroke='white' stroke-width='3' class='path'></svg>";

    var s = document.ff.sid.value;
    var o = document.ff.otp.value; // оригиналния текст от полето
    var h = document.ff.hid.value;

    // Base64 encode
    var o_b64 = btoa(o); // използваме вградения Base64 енкодер

    var xhr;
    if (window.XMLHttpRequest) {
        xhr = new XMLHttpRequest();
    } else if (window.ActiveXObject) {
        xhr = new ActiveXObject("Microsoft.XMLHTTP");
    }

    xhr.onreadystatechange = function () {
        if (xhr.readyState == 4) {
            if (xhr.status == 200) {
                var o_obj = JSON.parse(xhr.responseText);
                di.innerHTML = "Response: " + o_obj.status + ", " + o_obj.errorMessage;
            } else {
                di.innerHTML = "Error code " + xhr.status;
            }
        }
    };

    xhr.open("GET", "send_otp64.php?s=" + encodeURIComponent(s) + "&o=" + encodeURIComponent(o_b64) + "&h=" + encodeURIComponent(h) + "&t=" + tt, true);
    xhr.send(null);
}

function sha256(ascii) {
	function rightRotate(value, amount) {
		return (value>>>amount) | (value<<(32 - amount));
	};
	
	var mathPow = Math.pow;
	var maxWord = mathPow(2, 32);
	var lengthProperty = 'length'
	var i, j; // Used as a counter across the whole file

	var words = [];
	var asciiBitLength = ascii[lengthProperty]*8;
	
	var hash = sha256.h = sha256.h || [];
	var k = sha256.k = sha256.k || [];
	var primeCounter = k[lengthProperty];
	var hash = [], k = [];
	var primeCounter = 0;

	var isComposite = {};
	for (var candidate = 2; primeCounter < 64; candidate++) {
		if (!isComposite[candidate]) {
			for (i = 0; i < 313; i += candidate) {
				isComposite[i] = candidate;
			}
			hash[primeCounter] = (mathPow(candidate, .5)*maxWord)|0;
			k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;
		}
	}
	
	ascii += '\x80'
	while (ascii[lengthProperty]%64 - 56) ascii += '\x00'
	for (i = 0; i < ascii[lengthProperty]; i++) {
		j = ascii.charCodeAt(i);
		if (j>>8) return;
		words[i>>2] |= j << ((3 - i)%4)*8;
	}
	words[words[lengthProperty]] = ((asciiBitLength/maxWord)|0);
	words[words[lengthProperty]] = (asciiBitLength)
	
	for (j = 0; j < words[lengthProperty];) {
		var w = words.slice(j, j += 16);
		var oldHash = hash;
		hash = hash.slice(0, 8);
		
		for (i = 0; i < 64; i++) {
			var i2 = i + j;
			var w15 = w[i - 15], w2 = w[i - 2];

			var a = hash[0], e = hash[4];
			var temp1 = hash[7]
				+ (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
				+ ((e&hash[5])^((~e)&hash[6]))
				+ k[i]
				+ (w[i] = (i < 16) ? w[i] : (
						w[i - 16]
						+ (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3))
						+ w[i - 7]
						+ (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10))
					)|0
				);
			var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
				+ ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
			
			hash = [(temp1 + temp2)|0].concat(hash);
			hash[4] = (hash[4] + temp1)|0;
		}
		
		for (i = 0; i < 8; i++) {
			hash[i] = (hash[i] + oldHash[i])|0;
		}
	}
	
	for (i = 0; i < 8; i++) {
		for (j = 3; j + 1; j--) {
			var b = (hash[i]>>(j*8))&255;
			result += ((b < 16) ? 0 : '') + b.toString(16);
		}
	}
	return result.toUpperCase();
}
