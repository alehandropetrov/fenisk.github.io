<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Terminal Access</title>

<style>
    body {
        margin: 0;
        background: black;
        color: #00ff00;
        font-family: monospace;
        overflow: hidden;
    }

    /* терминал ефект */
    .terminal {
        padding: 20px;
        font-size: 16px;
        line-height: 1.4;
        white-space: pre-wrap;
    }

    .login-box {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
    }

    input {
        background: black;
        border: 1px solid #00ff00;
        color: #00ff00;
        padding: 10px;
        width: 220px;
        text-align: center;
        font-family: monospace;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        background: black;
        border: 1px solid #00ff00;
        color: #00ff00;
        cursor: pointer;
    }

    button:hover {
        background: #00ff00;
        color: black;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>

<div class="login-box">
    <div>ENTER ACCESS KEY:</div>
    <input type="password" id="password">
    <br>
    <button onclick="checkPassword()">RUN</button>
</div>

<script>
const terminal = document.getElementById("terminal");

const lines = [
"Initializing system...",
"Connecting to server...",
"Bypassing firewall...",
"Loading modules...",
"Access denied... retry required",
"Waiting for input...",
];

let i = 0;

function typeLines() {
    if (i < lines.length) {
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLines, 800);
    } else {
        terminal.innerHTML += "\n> SYSTEM READY\n";
    }
}

typeLines();

function checkPassword() {
    const pass = document.getElementById("password").value;

    if (pass === "Azis") {
        terminal.innerHTML += "\n> ACCESS GRANTED...\n> REDIRECTING...\n";
        setTimeout(() => {
            window.location.href = "body.html";
        }, 1500);
    } else {
        terminal.innerHTML += "\n> WRONG KEY DETECTED ❌\n";
    }
}
</script>

</body>
</html>
